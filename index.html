<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Main Menu</title>
  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ICON -->
  <link rel="icon" type="image/png" href="https://i.ibb.co.com/sdV75wcH/Logo.png">

  <!-- CSS KAMU -->
  <link rel="stylesheet" href="style_menu.css">

</head>

<body>

<div class="page">
  <div class="main">
    <div class="wrap">

      <!-- HEADER -->
      <div class="brand">
        <img class="logo" src="https://i.ibb.co.com/sdV75wcH/Logo.png">
        <div>
          <h1 class="title">PELEPASAN 2026</h1>
          <div class="subtitle">SMK Bintang Persada Denpasar</div>
        </div>
      </div>

      <div class="hero">
        <h2>Dashboard Pelepasan 2026</h2>
        <p>Pilih menu di bawah untuk melanjutkan.</p>
      </div>

      <!-- CARD -->
      <div class="card">
        <div class="card-head">
          <h3>Menu Utama</h3>
          <span class="badge-soft">Quick Access</span>
        </div>

        <div class="card-body">

          <!-- SISWA -->
          <div class="group group-paket1">
            <button type="button" class="group-btn caret">
              <span class="left">
                <span class="icon">S</span>
                SISWA
              </span>
              <span class="chev">▾</span>
            </button>

            <div class="group-menu nested">
              <div class="menu-grid">
                <a class="menu-link" href="/cek_kartu.html">Cek Kartu<span>→</span></a>
              </div>
            </div>
          </div>

          <!-- GURU -->
          <div class="group group-paket2">
            <button type="button" class="group-btn caret">
              <span class="left">
                <span class="icon">G</span>
                GURU
              </span>
              <span class="chev">▾</span>
            </button>

            <div class="group-menu nested">
              <div class="menu-grid">
                <a class="menu-link" href="/cek_kartu.html">Cek Kartu<span>→</span></a>
                <a class="menu-link" href="/scanner.html">Scanner<span>→</span></a>
                <a class="menu-link" href="/dashboard.html">Dashboard<span>→</span></a>
                <a class="menu-link" href="/kartu.html">Kartu<span>→</span></a>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer-minimal">
    <strong>© 2026 SMK Bintang Persada Denpasar</strong>
    <span class="sub">US 2025/2026</span>
  </footer>
</div>

<!-- SCRIPT -->
<script>
document.querySelectorAll(".group-btn").forEach(btn => {
  btn.addEventListener("click", function () {
    const currentGroup = this.closest(".group");

    document.querySelectorAll(".group").forEach(group => {
      if (group !== currentGroup) {
        group.classList.remove("open");
        const nested = group.querySelector(".nested");
        if (nested) nested.classList.remove("active");
      }
    });

    currentGroup.classList.toggle("open");
    const currentNested = currentGroup.querySelector(".nested");
    if (currentNested) currentNested.classList.toggle("active");
  });
});
</script>

</body>
</html>
